<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cachito</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main>
    <section class="hero" aria-label="Hero de Cachito">
      <div class="hero__layer-stack" aria-hidden="true">
        <img class="hero__layer hero__layer--background" src="./assets/HeroSVG.svg" alt="">
        <div class="hero__layer hero__layer--blue-transition"></div>
        <img class="hero__layer hero__layer--menu-home" src="./assets/MenuHome.svg" alt="">
        <img class="hero__layer hero__layer--high-hand" src="./assets/HighHand.svg" alt="">
        <img class="hero__layer hero__layer--base-hand" src="./assets/BaseHand.svg" alt="">
        <div class="hero__text-stage">
          <img class="hero__layer hero__layer--text" src="./assets/HeroText.svg" alt="">
        </div>
      </div>
      <button class="hero__text-button btn btn-glass magnetic" type="button" aria-label="Entrar en Cachito" data-magnetic>
        <span class="hero__text-glass" aria-hidden="true"></span>
      </button>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
